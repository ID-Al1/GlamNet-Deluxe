openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GlamNet API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: stylists
    description: Stylist profiles and portfolios
  - name: appointments
    description: Appointment booking
  - name: messages
    description: Client-stylist messaging
  - name: casting
    description: Brand casting calls
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stylists:
    get:
      operationId: listStylists
      tags: [stylists]
      summary: List stylists with optional filters
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of stylists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StylistProfile"

  /stylists/{stylistId}:
    get:
      operationId: getStylist
      tags: [stylists]
      summary: Get stylist profile
      parameters:
        - name: stylistId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stylist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylistProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stylists/me/profile:
    get:
      operationId: getMyStylistProfile
      tags: [stylists]
      summary: Get my stylist profile
      responses:
        "200":
          description: My stylist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylistProfile"

    patch:
      operationId: updateMyStylistProfile
      tags: [stylists]
      summary: Update my stylist profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StylistProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylistProfile"

  /stylists/me/services:
    post:
      operationId: addStylistService
      tags: [stylists]
      summary: Add a service to my profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /stylists/me/services/{serviceId}:
    patch:
      operationId: updateStylistService
      tags: [stylists]
      summary: Update a service
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

    delete:
      operationId: deleteStylistService
      tags: [stylists]
      summary: Delete a service
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /stylists/me/portfolio:
    post:
      operationId: addPortfolioItem
      tags: [stylists]
      summary: Add portfolio item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioItem"

  /stylists/me/portfolio/{itemId}:
    delete:
      operationId: deletePortfolioItem
      tags: [stylists]
      summary: Delete portfolio item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
        - name: role
          in: query
          schema:
            type: string
            enum: [client, stylist]
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{appointmentId}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment details
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations for current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/conversations/{conversationId}/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/start:
    post:
      operationId: startConversation
      tags: [messages]
      summary: Start a conversation with a stylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationInput"
      responses:
        "201":
          description: Conversation created or existing returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /casting:
    get:
      operationId: listCastingCalls
      tags: [casting]
      summary: List active casting calls
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: brandId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Casting calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CastingCall"

    post:
      operationId: createCastingCall
      tags: [casting]
      summary: Post a casting call (brand only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastingCallInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CastingCall"

  /casting/{castingId}:
    get:
      operationId: getCastingCall
      tags: [casting]
      summary: Get casting call details
      parameters:
        - name: castingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Casting call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CastingCall"

    patch:
      operationId: updateCastingCall
      tags: [casting]
      summary: Update a casting call
      parameters:
        - name: castingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastingCallUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CastingCall"

    delete:
      operationId: deleteCastingCall
      tags: [casting]
      summary: Delete a casting call
      parameters:
        - name: castingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /casting/{castingId}/apply:
    post:
      operationId: applyToCastingCall
      tags: [casting]
      summary: Apply to a casting call (stylist)
      parameters:
        - name: castingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stylist:
    get:
      operationId: getStylistDashboard
      tags: [dashboard]
      summary: Stylist dashboard summary
      responses:
        "200":
          description: Stylist dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylistDashboard"

  /dashboard/client:
    get:
      operationId: getClientDashboard
      tags: [dashboard]
      summary: Client dashboard summary
      responses:
        "200":
          description: Client dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDashboard"

  /dashboard/brand:
    get:
      operationId: getBrandDashboard
      tags: [dashboard]
      summary: Brand dashboard summary
      responses:
        "200":
          description: Brand dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    SignupInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [client, stylist, brand]
        businessName:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [client, stylist, brand]
        businessName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    StylistProfile:
      type: object
      required: [id, userId, name, specialty, location, rating, reviewCount, verified, verificationStatus, services, portfolio, availability]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        specialty:
          type: string
        location:
          type: string
        area:
          type: string
        bio:
          type: ["string", "null"]
        rating:
          type: number
        reviewCount:
          type: integer
        verified:
          type: boolean
        verificationStatus:
          type: string
          enum: [none, pending, verified]
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        portfolio:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioItem"
        availability:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        instagram:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        accentColor:
          type: ["string", "null"]

    StylistProfileUpdate:
      type: object
      properties:
        bio:
          type: string
        location:
          type: string
        area:
          type: string
        specialty:
          type: string
        instagram:
          type: string
        website:
          type: string
        availability:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    Service:
      type: object
      required: [id, name, price, duration]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        duration:
          type: integer

    ServiceInput:
      type: object
      required: [name, price, duration]
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        duration:
          type: integer
          minimum: 1

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        duration:
          type: integer

    PortfolioItem:
      type: object
      required: [id, title, type]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
        imageUrl:
          type: ["string", "null"]

    PortfolioItemInput:
      type: object
      required: [title, type]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
        imageUrl:
          type: string

    Appointment:
      type: object
      required: [id, clientId, stylistId, serviceId, serviceName, date, time, status, price, duration, createdAt]
      properties:
        id:
          type: string
        clientId:
          type: string
        clientName:
          type: string
        stylistId:
          type: string
        stylistName:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        date:
          type: string
        time:
          type: string
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        price:
          type: number
        duration:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [stylistId, serviceId, date, time]
      properties:
        stylistId:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        date:
          type: string
        time:
          type: string
        notes:
          type: string

    Conversation:
      type: object
      required: [id, participants, lastMessageAt, unreadCount]
      properties:
        id:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ConversationParticipant"
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: string
        unreadCount:
          type: integer

    ConversationParticipant:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]

    Message:
      type: object
      required: [id, conversationId, senderId, senderName, content, createdAt]
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    StartConversationInput:
      type: object
      required: [stylistId]
      properties:
        stylistId:
          type: string

    CastingCall:
      type: object
      required: [id, brandId, brandName, title, brief, budget, deadline, specialty, applicantCount, createdAt]
      properties:
        id:
          type: string
        brandId:
          type: string
        brandName:
          type: string
        title:
          type: string
        brief:
          type: string
        budget:
          type: string
        deadline:
          type: string
        specialty:
          type: string
        applicantCount:
          type: integer
        hasApplied:
          type: boolean
        createdAt:
          type: string

    CastingCallInput:
      type: object
      required: [title, brief, budget, deadline, specialty]
      properties:
        title:
          type: string
          minLength: 3
        brief:
          type: string
          minLength: 10
        budget:
          type: string
        deadline:
          type: string
        specialty:
          type: string

    CastingCallUpdate:
      type: object
      properties:
        title:
          type: string
        brief:
          type: string
        budget:
          type: string
        deadline:
          type: string
        specialty:
          type: string

    StylistDashboard:
      type: object
      required: [totalBookings, pendingBookings, confirmedBookings, completedBookings, totalEarnings, thisMonthEarnings, upcomingAppointments, recentActivity]
      properties:
        totalBookings:
          type: integer
        pendingBookings:
          type: integer
        confirmedBookings:
          type: integer
        completedBookings:
          type: integer
        totalEarnings:
          type: number
        thisMonthEarnings:
          type: number
        profileStrength:
          type: integer
        upcomingAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ClientDashboard:
      type: object
      required: [totalBookings, upcomingBookings, completedBookings, favouriteStylists, recentAppointments]
      properties:
        totalBookings:
          type: integer
        upcomingBookings:
          type: integer
        completedBookings:
          type: integer
        favouriteStylists:
          type: integer
        recentAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        recommendedStylists:
          type: array
          items:
            $ref: "#/components/schemas/StylistProfile"

    BrandDashboard:
      type: object
      required: [activeCastingCalls, totalApplications, totalSpend, teamSize, recentApplications, topCastingCalls]
      properties:
        activeCastingCalls:
          type: integer
        totalApplications:
          type: integer
        totalSpend:
          type: number
        teamSize:
          type: integer
        recentApplications:
          type: array
          items:
            $ref: "#/components/schemas/CastingApplication"
        topCastingCalls:
          type: array
          items:
            $ref: "#/components/schemas/CastingCall"

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string

    CastingApplication:
      type: object
      required: [id, castingId, castingTitle, stylistId, stylistName, appliedAt, status]
      properties:
        id:
          type: string
        castingId:
          type: string
        castingTitle:
          type: string
        stylistId:
          type: string
        stylistName:
          type: string
        appliedAt:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
